{% extends 'base.html' %}

{% block title %}
Profile
{% endblock %}

{% block content %}

<div class="card shadow">

    <div class="card-header bg-primary text-white">
        <h3>👤 My Profile</h3>
    </div>

    <div class="card-body">

        <form method="POST">

            <div class="mb-3">
                <label>Name</label>
                <input type="text"
                       class="form-control"
                       value="{{ session['username'] }}">
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="email"
                       class="form-control">
            </div>

            <div class="mb-3">
                <label>Phone</label>
                <input type="text"
                       class="form-control">
            </div>

            <button class="btn btn-primary">
                Update Profile
            </button>

        </form>

    </div>

</div>

{% endblock %}
