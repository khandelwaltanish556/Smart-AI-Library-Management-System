{% extends "base.html" %}

{% block title %}Edit Member{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header bg-warning text-dark text-center">
                    <h4>Edit Student</h4>
                </div>

                <div class="card-body">

                    <form action="/edit_member/{{ member.id }}" method="POST">

                        <div class="mb-3">
                            <label class="form-label">Admission No</label>
                                <input type="text"
                                    name="admission_no"
                                    class="form-control"
                                    value="{{ member.admission_no }}"
                                    required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                                <input type="text"
                                    name="full_name"
                                    class="form-control"
                                    value="{{ member.full_name }}"
                                    required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                                <input type="email"
                                    name="email"
                                    class="form-control"
                                    value="{{ member.email }}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Phone Number</label>
                                <input type="text"
                                    name="phone"
                                    class="form-control"
                                    value="{{ member.phone }}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Gender</label>

                            <select name="gender" class="form-select">

                                <option value="Male"
                                    {% if member.gender=="Male" %}selected{% endif %}>
                                        Male
                                </option>

                                <option value="Female"
                                    {% if member.gender=="Female" %}selected{% endif %}>
                                        Female
                                </option>

                                <option value="Other"
                                    {% if member.gender=="Other" %}selected{% endif %}>
                                        Other
                                </option>

                            </select>

                        </div>

                        <div class="mb-3">
                            <label class="form-label">Course</label>
                                <input type="text"
                                    name="course"
                                    class="form-control"
                                    value="{{ member.course }}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Address</label>

                                <textarea
                                    name="address"
                                     class="form-control"
                                    rows="3">{{ member.address }}</textarea>

                        </div>

                        <div class="mb-3">
                            <label class="form-label">Join Date</label>

                            <input type="date"
                                 name="join_date"
                                class="form-control"
                                value="{{ member.join_date }}">
                        </div>

                        <button class="btn btn-primary w-100">
                            <i class="fa-solid fa-floppy-disk"></i>
                                 Update Student
                        </button>

                    </form>
                </div>
            </div>

        </div>
    </div>

</div>

{% endblock %}
